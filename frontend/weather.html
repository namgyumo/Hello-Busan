<head>

    <link rel="alternate" hreflang="ko" href="https://hellobusan.kr/weather.html?lang=ko">

    <link rel="stylesheet" href="/css/style.css?v=4">

    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <script>
    (function(){try{var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
    </script>
</head>
<body class="page-weather">
    <!-- Offline Banner -->
    <div class="offline-banner" id="offline-banner" role="alert">
        <span class="offline-banner__icon" aria-hidden="true">&#x1F4F5;</span>
        <span data-i18n="offline_banner">오프라인 모드 - 저장된 데이터를 표시합니다</span>
    </div>

    <a href="#main-content" class="skip-link">본문으로 건너뛰기</a>

    <!-- Header -->
    <header class="header" role="banner">
        <a href="/" class="header__logo" aria-label="Hello, Busan! 홈으로">Hello, Busan!</a>
        <div class="header__actions">
            <button id="theme-toggle" class="theme-toggle" aria-label="다크모드 전환">
                <span class="theme-toggle__icon" aria-hidden="true">&#x2600;</span>
            </button>
            <select id="lang-select" class="lang-select" aria-label="Language">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="ru">Русский</option>
            </select>
        </div>
    </header>

    <main class="weather-main" id="main-content">
        <!-- Current Weather Hero -->
        <section class="weather-page-current" id="weather-current" aria-labelledby="weather-current-title">
            <div class="weather-page-current__hero" id="weather-current-hero">
                <div class="weather-page-current__icon" id="wp-current-icon" aria-hidden="true"></div>
                <div class="weather-page-current__info">
                    <h1 class="weather-page-current__title" id="weather-current-title" data-i18n="weather_page_title">부산 날씨</h1>
                    <div class="weather-page-current__temp" id="wp-current-temp">--&#x00B0;C</div>
                    <div class="weather-page-current__desc" id="wp-current-status">--</div>
                </div>
            </div>
            <div class="weather-page-current__details" id="weather-current-details">
                <div class="weather-page-current__detail-item">
                    <span class="weather-page-current__detail-icon" aria-hidden="true">&#x1F4A7;</span>
                    <span class="weather-page-current__detail-label" data-i18n="weather_humidity">습도</span>
                    <span class="weather-page-current__detail-value" id="weather-detail-humidity">--%</span>
                </div>
                <div class="weather-page-current__detail-item">
                    <span class="weather-page-current__detail-icon" aria-hidden="true">&#x1F4A8;</span>
                    <span class="weather-page-current__detail-label" data-i18n="weather_wind">풍속</span>
                    <span class="weather-page-current__detail-value" id="weather-detail-wind">--m/s</span>
                </div>
                <div class="weather-page-current__detail-item">
                    <span class="weather-page-current__detail-icon" aria-hidden="true">&#x2602;&#xFE0F;</span>
                    <span class="weather-page-current__detail-label" data-i18n="weather_sky">하늘</span>
                    <span class="weather-page-current__detail-value" id="weather-detail-sky">--</span>
                </div>
                <div class="weather-page-current__detail-item">
                    <span class="weather-page-current__detail-icon" aria-hidden="true">&#x1F327;&#xFE0F;</span>
                    <span class="weather-page-current__detail-label" data-i18n="weather_rain_type">강수</span>
                    <span class="weather-page-current__detail-value" id="weather-detail-rain">--</span>
                </div>
            </div>
            <div class="weather-page-current__timestamp" id="weather-current-timestamp"></div>
        </section>

        <!-- Hourly Timeline -->
        <section class="weather-page-section weather-page-hourly" id="hourly-section" aria-labelledby="section-hourly">
            <h2 class="weather-section__title" id="section-hourly" data-i18n="weather_hourly_title">시간대별 날씨</h2>
            <div class="weather-page-hourly__scroll">
                <div class="weather-page-hourly__list" id="weather-hourly-list">
                    <!-- JS로 렌더링 -->
                </div>
            </div>
        </section>

        <!-- 7-Day Forecast -->
        <section class="home-section forecast-section" id="weather-forecast-section" aria-labelledby="section-weather-forecast">
            <h2 class="home-section__title" id="section-weather-forecast" data-i18n="forecast_title">이번 주 날씨 &amp; 추천 여행일</h2>
            <div class="forecast-scroll"><div class="forecast-list" id="weather-forecast-list">
                <div class="skeleton skeleton-popular"></div>
                <div class="skeleton skeleton-popular"></div>
                <div class="skeleton skeleton-popular"></div>
            </div></div>
            <!-- Forecast Detail Panel -->
            <div class="forecast-detail" id="weather-forecast-detail" style="display:none;">
                <div class="forecast-detail__header">
                    <h3 class="forecast-detail__title" id="weather-forecast-detail-title"></h3>
                    <button class="forecast-detail__close" id="weather-forecast-detail-close" aria-label="Close">&times;</button>
                </div>
                <div class="forecast-detail__body" id="weather-forecast-detail-body"></div>
                <div class="forecast-detail__spots" id="weather-forecast-detail-spots"></div>
            </div>
        </section>

        <!-- Air Quality -->
        <section class="weather-page-air" id="air-quality-section" aria-labelledby="section-air-quality" style="display:none;">
            <h2 class="weather-section__title" id="section-air-quality" data-i18n="weather_air_quality_title">대기질 정보</h2>
            <div class="weather-page-air__card" id="air-quality-card">
                <div class="weather-page-air__index" id="air-quality-grade">
                    <span class="weather-page-air__index-icon" id="air-quality-icon" aria-hidden="true"></span>
                    <span class="weather-page-air__level" id="air-quality-text">--</span>
                </div>
                <div class="weather-page-air__details" id="air-quality-details">
                    <div class="weather-page-air__detail-item">
                        <span class="weather-page-air__detail-label">PM10</span>
                        <span class="weather-page-air__detail-value" id="aq-pm10">--</span>
                        <span class="weather-page-air__detail-unit">&micro;g/m&sup3;</span>
                    </div>
                    <div class="weather-page-air__detail-item">
                        <span class="weather-page-air__detail-label">PM2.5</span>
                        <span class="weather-page-air__detail-value" id="aq-pm25">--</span>
                        <span class="weather-page-air__detail-unit">&micro;g/m&sup3;</span>
                    </div>
                    <div class="weather-page-air__detail-item">
                        <span class="weather-page-air__detail-label">O&sub3;</span>
                        <span class="weather-page-air__detail-value" id="aq-o3">--</span>
                        <span class="weather-page-air__detail-unit">ppm</span>
                    </div>
                    <div class="weather-page-air__detail-item">
                        <span class="weather-page-air__detail-label">NO&sub2;</span>
                        <span class="weather-page-air__detail-value" id="aq-no2">--</span>
                        <span class="weather-page-air__detail-unit">ppm</span>
                    </div>
                </div>
                <p class="weather-page-air__message" id="air-quality-message"></p>
            </div>
        </section>

        <!-- Weather Smart Recommend -->
        <section class="smart-recommend weather-smart-recommend" id="weather-smart-recommend-section" aria-label="날씨 맞춤 추천" style="display:none;">
            <div class="smart-recommend__header">
                <span class="smart-recommend__weather-icon" id="wp-smart-rec-icon" aria-hidden="true"></span>
                <div class="smart-recommend__header-text">
                    <h2 class="smart-recommend__title" id="wp-smart-rec-title" data-i18n="smart_rec_weather_title">이 날씨에 추천하는 곳</h2>
                    <p class="smart-recommend__message" id="wp-smart-rec-message"></p>
                    <p class="smart-recommend__temp" id="wp-smart-rec-temp"></p>
                </div>
            </div>
            <div class="smart-recommend__scroll">
                <div class="smart-recommend__list" id="wp-smart-rec-list">
                    <!-- JS로 렌더링 -->
                </div>
            </div>
        </section>

        <!-- Weather-based Spot Recommendations -->
        <section class="home-section" id="weather-spots-section" aria-labelledby="section-weather-spots">
            <h2 class="home-section__title" id="section-weather-spots" data-i18n="weather_spots_title">관광지별 날씨 영향</h2>
            <div class="weather-spots-tabs" id="weather-spots-tabs">
                <button class="weather-spots-tab weather-spots-tab--active" data-type="recommend" data-i18n="weather_spots_recommend">추천</button>
                <button class="weather-spots-tab" data-type="caution" data-i18n="weather_spots_caution">주의</button>
            </div>
            <div class="weather-spots-list" id="weather-spots-list">
                <div class="skeleton skeleton-popular"></div>
                <div class="skeleton skeleton-popular"></div>
            </div>
            <p class="weather-spots-empty" id="weather-spots-empty" style="display:none;" data-i18n="weather_spots_empty">날씨 데이터를 불러오는 중입니다</p>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" role="navigation" aria-label="메인 메뉴">
        <a href="/" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x1F3E0;</span>
            <span class="bottom-nav__label" data-i18n="nav_home">홈</span>
        </a>
        <a href="/map.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x1F5FA;</span>
            <span class="bottom-nav__label" data-i18n="nav_map">지도</span>
        </a>
        <a href="/weather.html" class="bottom-nav__item bottom-nav__item--active" aria-current="page">
            <span class="bottom-nav__icon" aria-hidden="true">&#x26C5;</span>
            <span class="bottom-nav__label" data-i18n="nav_weather">날씨</span>
        </a>
        <a href="/ai.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x2728;</span>
            <span class="bottom-nav__label" data-i18n="nav_ai">AI 추천</span>
        </a>
        <a href="/favorites.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x2764;</span>
            <span class="bottom-nav__label" data-i18n="nav_favorites">저장</span>
        </a>
    </nav>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/js/analytics.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/pwa.js"></script>
    <script src="/js/favorites.js"></script>
    <script src="/js/offline-store.js"></script>
    <script src="/js/weather-page.js"></script>

    <!-- SW Update Toast -->
    <div class="sw-update-toast" id="sw-update-toast" role="alert">
        <span data-i18n="update_available">새 버전이 있습니다</span>
        <button class="sw-update-toast__btn" id="sw-update-btn" data-i18n="update_refresh">새로고침</button>
    </div>

    <!-- Service Worker Registration & Offline Detection -->
    <script>
    (function() {
        // Offline detection
        function updateOnlineStatus() {
            if (!navigator.onLine) {
                document.body.classList.add('is-offline');
            } else {
                document.body.classList.remove('is-offline');
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // IndexedDB favorites sync
        if (typeof OfflineStore !== 'undefined') {
            OfflineStore.initFavoritesSync();
        }

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(function(reg) {
                reg.addEventListener('updatefound', function() {
                    var newWorker = reg.installing;
                    newWorker.addEventListener('statechange', function() {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            var toast = document.getElementById('sw-update-toast');
                            if (toast) toast.classList.add('visible');
                            var btn = document.getElementById('sw-update-btn');
                            if (btn) {
                                btn.addEventListener('click', function() {
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    window.location.reload();
                                });
                            }
                        }
                    });
                });
            }).catch(function(err) {
                console.warn('SW registration failed:', err);
            });
        }
    })();
    </script>
</body>
</html>
