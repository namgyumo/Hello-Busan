    <style>
    /* ===== AI Recommend Page Styles ===== */
    .ai-main {
        display: flex;
        flex-direction: column;
        min-height: calc(100dvh - var(--bottom-nav-h) - 56px);
        padding-bottom: 140px;
        background: var(--color-bg);
    }

    .ai-header {
        padding: 20px 16px 12px;
        text-align: center;
    }

    .ai-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--color-text);
        margin: 0;
    }

    .ai-subtitle {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        margin: 4px 0 0;
    }

    /* Chat Area */
    .ai-chat {
        flex: 1;
        overflow-y: auto;
        padding: 0 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    /* Welcome Section */
    .ai-welcome {
        text-align: center;
        padding: 32px 16px;
    }

    .ai-welcome__icon {
        font-size: 3rem;
        margin-bottom: 12px;
        display: block;
    }

    .ai-welcome__text {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--color-text);
        margin: 0 0 8px;
        line-height: 1.5;
    }

    .ai-welcome__desc {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        margin: 0;
    }

    /* Example Chips */
    .ai-chips {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        padding: 0 16px;
    }

    .ai-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-full);
        font-size: 0.875rem;
        color: var(--color-text);
        cursor: pointer;
        transition: all var(--transition);
        font-family: var(--font-family);
        white-space: nowrap;
    }

    .ai-chip:hover,
    .ai-chip:focus-visible {
        background: var(--color-primary-light);
        border-color: var(--color-primary);
        color: var(--color-primary);
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
    }

    .ai-chip__icon {
        font-size: 1rem;
    }

    /* Chat Messages */
    .ai-message {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: var(--radius-lg);
        font-size: 0.9375rem;
        line-height: 1.6;
        animation: aiMsgIn 0.3s ease;
    }

    @keyframes aiMsgIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .ai-message--user {
        align-self: flex-end;
        background: var(--color-primary);
        color: #fff;
        border-bottom-right-radius: 4px;
    }

    .ai-message--ai {
        align-self: flex-start;
        background: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-bottom-left-radius: 4px;
    }

    .ai-message--ai .ai-message__label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--color-primary);
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    /* Loading Animation */
    .ai-loading {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        align-self: flex-start;
        animation: aiMsgIn 0.3s ease;
    }

    .ai-loading__dots {
        display: flex;
        gap: 4px;
    }

    .ai-loading__dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--color-primary);
        animation: aiDotPulse 1.4s ease-in-out infinite;
    }

    .ai-loading__dot:nth-child(2) { animation-delay: 0.2s; }
    .ai-loading__dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes aiDotPulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1); }
    }

    .ai-loading__text {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
    }

    /* Result Cards Container */
    .ai-results {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        animation: aiMsgIn 0.3s ease;
    }

    .ai-results__title {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--color-primary);
        margin: 0 0 4px;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    /* Spot Card */
    .ai-card {
        display: flex;
        gap: 12px;
        padding: 12px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        transition: all var(--transition);
        text-decoration: none;
        color: inherit;
    }

    .ai-card:hover,
    .ai-card:focus-visible {
        box-shadow: var(--shadow-md);
        border-color: var(--color-primary);
        transform: translateY(-2px);
    }

    .ai-card__img {
        width: 80px;
        height: 80px;
        border-radius: var(--radius-sm);
        object-fit: cover;
        background: var(--color-bg);
        flex-shrink: 0;
    }

    .ai-card__img-placeholder {
        width: 80px;
        height: 80px;
        border-radius: var(--radius-sm);
        background: linear-gradient(135deg, var(--color-primary-light), var(--color-bg));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        flex-shrink: 0;
    }

    .ai-card__body {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .ai-card__top {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .ai-card__name {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--color-text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .ai-card__rank {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--color-primary);
        background: var(--color-primary-light);
        padding: 2px 8px;
        border-radius: var(--radius-full);
        flex-shrink: 0;
    }

    .ai-card__cat {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.75rem;
        color: var(--color-text-secondary);
        background: var(--color-bg);
        padding: 2px 8px;
        border-radius: var(--radius-full);
        width: fit-content;
    }

    .ai-card__reason {
        font-size: 0.8125rem;
        color: var(--color-text-secondary);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .ai-card__link {
        font-size: 0.8125rem;
        color: var(--color-primary);
        font-weight: 500;
        text-decoration: none;
        align-self: flex-end;
        margin-top: auto;
    }

    .ai-card__link:hover {
        text-decoration: underline;
    }

    /* Skeleton Card */
    .ai-skeleton-card {
        display: flex;
        gap: 12px;
        padding: 12px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
    }

    .ai-skeleton__img {
        width: 80px;
        height: 80px;
        border-radius: var(--radius-sm);
        background: linear-gradient(90deg, var(--color-bg) 25%, var(--color-border) 50%, var(--color-bg) 75%);
        background-size: 200% 100%;
        animation: aiShimmer 1.5s infinite;
        flex-shrink: 0;
    }

    .ai-skeleton__lines {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
        justify-content: center;
    }

    .ai-skeleton__line {
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(90deg, var(--color-bg) 25%, var(--color-border) 50%, var(--color-bg) 75%);
        background-size: 200% 100%;
        animation: aiShimmer 1.5s infinite;
    }

    .ai-skeleton__line--short { width: 60%; }
    .ai-skeleton__line--medium { width: 80%; }
    .ai-skeleton__line--long { width: 100%; }

    @keyframes aiShimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
    }

    /* Input Area */
    .ai-input-area {
        position: fixed;
        bottom: var(--bottom-nav-h);
        left: 0;
        right: 0;
        padding: 12px 16px;
        background: var(--color-surface);
        border-top: 1px solid var(--color-border);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .ai-input-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-full);
        padding: 0 16px;
        transition: border-color var(--transition);
    }

    .ai-input-wrap:focus-within {
        border-color: var(--color-primary);
    }

    .ai-input {
        flex: 1;
        border: none;
        background: transparent;
        padding: 12px 0;
        font-size: 0.9375rem;
        font-family: var(--font-family);
        color: var(--color-text);
        outline: none;
        min-width: 0;
    }

    .ai-input::placeholder {
        color: var(--color-text-secondary);
    }

    .ai-send-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: none;
        background: var(--color-primary);
        color: #fff;
        font-size: 1.25rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
        flex-shrink: 0;
    }

    .ai-send-btn:hover {
        background: var(--color-primary-dark);
        transform: scale(1.05);
    }

    .ai-send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    /* Error Message */
    .ai-error {
        padding: 12px 16px;
        background: #FEF2F2;
        border: 1px solid #FECACA;
        border-radius: var(--radius-md);
        color: #DC2626;
        font-size: 0.875rem;
        display: flex;
        align-items: center;
        gap: 8px;
        animation: aiMsgIn 0.3s ease;
    }

    [data-theme="dark"] .ai-error {
        background: #7F1D1D;
        border-color: #991B1B;
        color: #FCA5A5;
    }

    .ai-error__retry {
        margin-left: auto;
        padding: 4px 12px;
        background: transparent;
        border: 1px solid currentColor;
        border-radius: var(--radius-full);
        color: inherit;
        font-size: 0.8125rem;
        cursor: pointer;
        font-family: var(--font-family);
        white-space: nowrap;
    }

    .ai-error__retry:hover {
        opacity: 0.8;
    }

    /* Dark mode adjustments */
    [data-theme="dark"] .ai-card__img-placeholder {
        background: linear-gradient(135deg, #1A365D, #2563EB);
    }
    </style>
</head>
<body class="page-ai">
    <!-- Offline Banner -->
    <div class="offline-banner" id="offline-banner" role="alert">
        <span class="offline-banner__icon" aria-hidden="true">&#x1F4F5;</span>
        <span data-i18n="offline_banner">오프라인 모드 - 저장된 데이터를 표시합니다</span>
    </div>

    <a href="#main-content" class="skip-link">본문으로 건너뛰기</a>

    <!-- Header -->
    <header class="header" role="banner">
        <a href="/" class="header__logo" aria-label="Hello, Busan! 홈으로">Hello, Busan!</a>
        <div class="header__actions">
            <button id="theme-toggle" class="theme-toggle" aria-label="다크모드 전환">
                <span class="theme-toggle__icon" aria-hidden="true">&#x2600;</span>
            </button>
            <select id="lang-select" class="lang-select" aria-label="Language">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="ru">Русский</option>
            </select>
        </div>
    </header>

    <main class="ai-main" id="main-content">
        <div class="ai-header">
            <h1 class="ai-title" data-i18n="ai_title">AI 추천</h1>
            <p class="ai-subtitle" data-i18n="ai_subtitle">AI가 당신에게 딱 맞는 부산 관광지를 추천합니다</p>
        </div>

        <!-- Chat Area -->
        <div class="ai-chat" id="ai-chat">
            <!-- Welcome Message -->
            <div class="ai-welcome" id="ai-welcome">
                <span class="ai-welcome__icon" aria-hidden="true">&#x2728;</span>
                <p class="ai-welcome__text" data-i18n="ai_welcome">어떤 관광지를 찾으시나요?<br>자유롭게 말씀해주세요!</p>
                <p class="ai-welcome__desc" data-i18n="ai_welcome_desc">취향, 날씨, 동행자 등을 알려주시면 더 정확하게 추천해 드릴게요</p>
            </div>

            <!-- Example Chips -->
            <div class="ai-chips" id="ai-chips">
                <button class="ai-chip" data-query="비 오는 날 실내 데이트">
                    <span class="ai-chip__icon" aria-hidden="true">&#x1F327;</span>
                    비 오는 날 실내 데이트
                </button>
                <button class="ai-chip" data-query="아이와 함께 자연 체험">
                    <span class="ai-chip__icon" aria-hidden="true">&#x1F333;</span>
                    아이와 함께 자연 체험
                </button>
                <button class="ai-chip" data-query="야경 맛집 코스">
                    <span class="ai-chip__icon" aria-hidden="true">&#x1F303;</span>
                    야경 맛집 코스
                </button>
                <button class="ai-chip" data-query="혼자 여행 힐링 코스">
                    <span class="ai-chip__icon" aria-hidden="true">&#x1F9D8;</span>
                    혼자 여행 힐링 코스
                </button>
                <button class="ai-chip" data-query="부산 전통시장 먹방 투어">
                    <span class="ai-chip__icon" aria-hidden="true">&#x1F35C;</span>
                    부산 전통시장 먹방 투어
                </button>
                <button class="ai-chip" data-query="인생샷 명소 추천">
                    <span class="ai-chip__icon" aria-hidden="true">&#x1F4F8;</span>
                    인생샷 명소 추천
                </button>
            </div>
        </div>

        <!-- Results will be rendered here by ai-recommend.js -->
    </main>

    <!-- Fixed Input Area -->
    <div class="ai-input-area" id="ai-input-area">
        <div class="ai-input-wrap">
            <input
                type="text"
                id="ai-input"
                class="ai-input"
                data-i18n-placeholder="ai_input_placeholder"
                placeholder="원하는 관광지를 설명해 보세요..."
                autocomplete="off"
                maxlength="200"
            >
        </div>
        <button id="ai-send-btn" class="ai-send-btn" aria-label="전송" disabled>
            <span aria-hidden="true">&#x27A4;</span>
        </button>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" role="navigation" aria-label="메인 메뉴">
        <a href="/" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x1F3E0;</span>
            <span class="bottom-nav__label" data-i18n="nav_home">홈</span>
        </a>
        <a href="/map.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x1F5FA;</span>
            <span class="bottom-nav__label" data-i18n="nav_map">지도</span>
        </a>
        <a href="/ai.html" class="bottom-nav__item bottom-nav__item--active" aria-current="page">
            <span class="bottom-nav__icon" aria-hidden="true">&#x2728;</span>
            <span class="bottom-nav__label" data-i18n="nav_ai">AI</span>
        </a>
        <a href="/weather.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x26C5;</span>
            <span class="bottom-nav__label" data-i18n="nav_weather">날씨</span>
        </a>
        <a href="/favorites.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x2764;</span>
            <span class="bottom-nav__label" data-i18n="nav_favorites">저장</span>
        </a>
    </nav>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/js/analytics.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/pwa.js"></script>
    <script src="/js/favorites.js"></script>
    <script src="/js/offline-store.js"></script>
    <script src="/js/ai-recommend.js"></script>

    <!-- SW Update Toast -->
    <div class="sw-update-toast" id="sw-update-toast" role="alert">
        <span data-i18n="update_available">새 버전이 있습니다</span>
        <button class="sw-update-toast__btn" id="sw-update-btn" data-i18n="update_refresh">새로고침</button>
    </div>

    <!-- Service Worker Registration & Offline Detection -->
    <script>
    (function() {
        // Offline detection
        function updateOnlineStatus() {
            if (!navigator.onLine) {
                document.body.classList.add('is-offline');
            } else {
                document.body.classList.remove('is-offline');
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // IndexedDB favorites sync
        if (typeof OfflineStore !== 'undefined') {
            OfflineStore.initFavoritesSync();
        }

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(function(reg) {
                reg.addEventListener('updatefound', function() {
                    var newWorker = reg.installing;
                    newWorker.addEventListener('statechange', function() {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            var toast = document.getElementById('sw-update-toast');
                            if (toast) toast.classList.add('visible');
                            var btn = document.getElementById('sw-update-btn');
                            if (btn) {
                                btn.addEventListener('click', function() {
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    window.location.reload();
                                });
                            }
                        }
                    });
                });
            }).catch(function(err) {
                console.warn('SW registration failed:', err);
            });
        }
    })();
    </script>
