<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello, Busan! — 부산 관광지 스마트 추천</title>
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- 프로젝트 스타일 -->
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/common.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">🌊 Hello, Busan!</h1>
        <nav class="header__nav">
            <ul class="nav__list">
                <li><a href="#map" class="nav__link">지도</a></li>
                <li><a href="#comfort" class="nav__link">쾌적함 지수</a></li>
                <li><a href="#spots" class="nav__link">관광지</a></li>
            </ul>
            <select id="lang-select" class="lang-select">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="zh-tw">繁體中文</option>
            </select>
        </nav>
    </header>
    <main class="main">
        <section class="hero">
            <h2 class="hero__title">덜 붐비면서 나한테 맞는 관광지를 찾아보세요</h2>
            <p class="hero__subtitle">실시간 혼잡도 + AI 추천으로 쾌적한 부산 여행</p>
        </section>
        <section id="map" class="map-section">
            <h3 class="section__title">📍 실시간 혼잡도 히트맵</h3>
            <div id="heatmap" class="heatmap-container"></div>
        </section>
        <section id="comfort" class="comfort-section">
            <h3 class="section__title">📊 쾌적함 지수 대시보드</h3>
            <div id="comfort-dashboard" class="comfort-dashboard"></div>
        </section>
        <section class="category-section">
            <h3 class="section__title">🏷️ 카테고리별 추천</h3>
            <div class="category-filters">
                <button class="category-btn active" data-category="all">전체</button>
                <button class="category-btn" data-category="nature">🏞️ 자연</button>
                <button class="category-btn" data-category="culture">🏛️ 문화</button>
                <button class="category-btn" data-category="food">🍜 음식</button>
                <button class="category-btn" data-category="activity">🎯 체험</button>
            </div>
        </section>
        <section id="spots" class="spot-section">
            <h3 class="section__title">🏖️ 추천 관광지</h3>
            <div id="spot-list" class="spot-list"></div>
        </section>
    </main>
    <footer class="footer">
        <p>&copy; 2026 Hello, Busan! All rights reserved.</p>
    </footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
