    <!-- SW Update Toast -->
    <div class="sw-update-toast" id="sw-update-toast" role="alert">
        <span data-i18n="update_available">새 버전이 있습니다</span>
        <button class="sw-update-toast__btn" id="sw-update-btn" data-i18n="update_refresh">새로고침</button>
    </div>

    <!-- Service Worker Registration & Offline Detection -->
    <script>
    (function() {
        // Offline detection
        function updateOnlineStatus() {
            if (!navigator.onLine) {
                document.body.classList.add('is-offline');
            } else {
                document.body.classList.remove('is-offline');
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // IndexedDB favorites sync
        if (typeof OfflineStore !== 'undefined') {
            OfflineStore.initFavoritesSync();
        }

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(function(reg) {
                reg.addEventListener('updatefound', function() {
                    var newWorker = reg.installing;
                    newWorker.addEventListener('statechange', function() {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            var toast = document.getElementById('sw-update-toast');
                            if (toast) toast.classList.add('visible');
                            var btn = document.getElementById('sw-update-btn');
                            if (btn) {
                                btn.addEventListener('click', function() {
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    window.location.reload();
                                });
                            }
                        }
                    });
                });
            }).catch(function(err) {
                console.warn('SW registration failed:', err);
            });
        }
    })();
    </script>
