<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코스 빌더 — Hello, Busan!</title>
    <meta name="description" content="나만의 부산 여행 코스를 만들어보세요 — 관광지 추가, 동선 최적화, 일차별 계획">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="/css/style.css?v=4">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg">
    <meta name="theme-color" content="#0066CC">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <script>
    (function(){try{var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
    </script>
</head>
<body class="page-course">
    <!-- Offline Banner -->
    <div class="offline-banner" id="offline-banner" role="alert">
        <span class="offline-banner__icon" aria-hidden="true">&#x1F4F5;</span>
        <span data-i18n="offline_banner">오프라인 모드 - 저장된 데이터를 표시합니다</span>
    </div>

    <a href="#course-main" class="skip-link">본문으로 건너뛰기</a>

    <!-- Header -->
    <header class="header" role="banner">
        <a href="/" class="header__logo" aria-label="Hello, Busan! 홈으로">Hello, Busan!</a>
        <div class="header__actions">
            <button id="theme-toggle" class="theme-toggle" aria-label="다크모드 전환">
                <span class="theme-toggle__icon" aria-hidden="true">&#x2600;</span>
            </button>
            <select id="lang-select" class="lang-select" aria-label="Language">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="ru">Русский</option>
            </select>
        </div>
    </header>

    <main class="course-builder-page" id="course-main">
        <!-- Course List View (shown when no course is being edited) -->
        <div id="cb-list-view">
            <div style="padding:1rem;display:flex;align-items:center;justify-content:space-between">
                <h1 style="font-size:1.2rem;font-weight:800" data-i18n="cb_my_courses">내 코스</h1>
                <button class="cb-btn cb-btn--primary" id="cb-new-course-btn">
                    <span aria-hidden="true">+</span>
                    <span data-i18n="cb_new_course">새 코스</span>
                </button>
            </div>
            <div class="cb-my-courses" id="cb-course-list">
                <!-- Dynamically rendered -->
            </div>
        </div>

        <!-- Course Editor View (shown when editing a course) -->
        <div id="cb-editor-view" style="display:none">
            <!-- Title bar -->
            <div class="cb-header">
                <button class="cb-header__back" id="cb-back-btn" aria-label="뒤로">&larr;</button>
                <input type="text" class="cb-title-input" id="cb-course-title"
                       placeholder="코스 제목을 입력하세요" data-i18n-placeholder="cb_title_placeholder" maxlength="50">
            </div>

            <!-- Day tabs -->
            <div class="cb-day-tabs" id="cb-day-tabs">
                <button class="cb-day-tab cb-day-tab--active" data-day="1">Day 1</button>
                <button class="cb-day-tab cb-day-tab--add" id="cb-add-day-btn" aria-label="일차 추가">+</button>
            </div>

            <!-- Spot list for current day -->
            <div class="cb-spot-list" id="cb-spot-list">
                <!-- Dynamically rendered -->
            </div>

            <!-- Distance info -->
            <div class="cb-distance" id="cb-distance-info" style="display:none">
                <span aria-hidden="true">&#x1F4CF;</span>
                <span data-i18n="cb_total_distance">총 예상 이동거리:</span>
                <span class="cb-distance__value" id="cb-distance-value">0 km</span>
            </div>

            <!-- Actions -->
            <div class="cb-actions">
                <button class="cb-btn cb-btn--primary" id="cb-add-spot-btn">
                    <span aria-hidden="true">+</span>
                    <span data-i18n="cb_add_spot">관광지 추가</span>
                </button>
                <button class="cb-btn cb-btn--secondary" id="cb-optimize-btn" disabled>
                    <span aria-hidden="true">&#x26A1;</span>
                    <span data-i18n="cb_optimize">동선 최적화</span>
                </button>
                <button class="cb-btn cb-btn--danger" id="cb-delete-day-btn">
                    <span aria-hidden="true">&#x1F5D1;</span>
                    <span data-i18n="cb_delete_day">일차 삭제</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Add Spot Modal -->
    <div class="cb-modal-overlay" id="cb-modal-overlay">
        <div class="cb-modal" role="dialog" aria-modal="true" aria-label="관광지 검색">
            <div class="cb-modal__header">
                <input type="text" class="cb-modal__search" id="cb-search-input"
                       placeholder="관광지 이름으로 검색" data-i18n-placeholder="cb_search_placeholder">
                <button class="cb-modal__close" id="cb-modal-close" aria-label="닫기">&times;</button>
            </div>
            <div class="cb-modal__body" id="cb-search-results">
                <div class="cb-modal__loading" data-i18n="cb_search_hint">관광지 이름을 검색하세요</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="cb-toast" id="cb-toast" role="status" aria-live="polite"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" role="navigation" aria-label="메인 메뉴">
        <a href="/" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x1F3E0;</span>
            <span class="bottom-nav__label" data-i18n="nav_home">홈</span>
        </a>
        <a href="/map.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x1F5FA;</span>
            <span class="bottom-nav__label" data-i18n="nav_map">지도</span>
        </a>
        <a href="/weather.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x26C5;</span>
            <span class="bottom-nav__label" data-i18n="nav_weather">날씨</span>
        </a>
        <a href="/ai.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x2728;</span>
            <span class="bottom-nav__label" data-i18n="nav_ai">AI 추천</span>
        </a>
        <a href="/favorites.html" class="bottom-nav__item">
            <span class="bottom-nav__icon" aria-hidden="true">&#x2764;</span>
            <span class="bottom-nav__label" data-i18n="nav_favorites">저장</span>
        </a>
    </nav>

    <script src="/js/analytics.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/pwa.js"></script>
    <script src="/js/course-builder.js"></script>

    <!-- SW Update Toast -->
    <div class="sw-update-toast" id="sw-update-toast" role="alert">
        <span data-i18n="update_available">새 버전이 있습니다</span>
        <button class="sw-update-toast__btn" id="sw-update-btn" data-i18n="update_refresh">새로고침</button>
    </div>

    <!-- Service Worker Registration & Offline Detection -->
    <script>
    (function() {
        function updateOnlineStatus() {
            if (!navigator.onLine) {
                document.body.classList.add('is-offline');
            } else {
                document.body.classList.remove('is-offline');
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(function(reg) {
                reg.addEventListener('updatefound', function() {
                    var newWorker = reg.installing;
                    newWorker.addEventListener('statechange', function() {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            var toast = document.getElementById('sw-update-toast');
                            if (toast) toast.classList.add('visible');
                            var btn = document.getElementById('sw-update-btn');
                            if (btn) {
                                btn.addEventListener('click', function() {
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    window.location.reload();
                                });
                            }
                        }
                    });
                });
            }).catch(function(err) {
                console.warn('SW registration failed:', err);
            });
        }
    })();
    </script>
</body>
</html>
