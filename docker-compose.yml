services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hello-busan
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
      - ./ml_data:/app/ml_data
      - ./frontend:/app/frontend
      - ./logs:/app/logs
      - ./Dataset:/app/Dataset
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 2048M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
